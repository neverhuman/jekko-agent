schema_version = "1.0.0"
sandbox_root = "~/.local/share/agent-sandboxes"

[[lane]]
name = "experiment-worktree"
command_id = "sandbox.experiment-worktree"
kind = "sandbox"
purpose = "test fixture"
command = "tools/sandbox-wrap.sh --lane experiment-worktree -- just experiment"
cost = 8
destructive = false
timeout_seconds = 1800
requires_network = false
rules_covered = ["HLT-012-OVERBROAD-AGENCY"]
required_artifacts = ["{sandbox_root}/{run_id}/patch.diff"]

[lane.workspace]
kind = "worktree"
base_branch = "main"

[lane.runtime]
backend = "worktree"
timeout_seconds = 1800

[lane.commands]
allowed_patterns = ["sh *", "just *"]
denied_patterns = ["git push*", "rm -rf /*", "cargo install*"]
wrapper = "tools/sandbox-wrap.sh"

[lane.environment]
home = "{sandbox_root}/{run_id}/home"
tmpdir = "{sandbox_root}/{run_id}/tmp"
cache_home = "{sandbox_root}/{run_id}/cache"

[lane.export]
patch_path = "{sandbox_root}/{run_id}/patch.diff"

[[lane]]
name = "experiment-docker"
command_id = "sandbox.experiment-docker"
kind = "sandbox"
purpose = "test fixture (container)"
command = "tools/sandbox-wrap.sh --lane experiment-docker -- just experiment"
cost = 12
destructive = false
timeout_seconds = 2400
requires_network = false
rules_covered = ["HLT-012-OVERBROAD-AGENCY"]
required_artifacts = ["{sandbox_root}/{run_id}/patch.diff"]

[lane.workspace]
kind = "worktree"

[lane.runtime]
backend = "docker"
timeout_seconds = 2400
image = "ghcr.io/opencode/sandbox-runner:latest"

[lane.commands]
allowed_patterns = ["sh *", "just *"]
denied_patterns = ["git push*"]
wrapper = "tools/sandbox-wrap.sh"

[lane.environment]
home = "{sandbox_root}/{run_id}/home"
tmpdir = "{sandbox_root}/{run_id}/tmp"
cache_home = "{sandbox_root}/{run_id}/cache"

[lane.export]
patch_path = "{sandbox_root}/{run_id}/patch.diff"
